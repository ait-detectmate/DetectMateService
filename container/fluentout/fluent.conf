


<source>
  @type nng
  @id input_nng
  <parse>
#     @type none
#    @type detectmate
    @type protobuf
    class_file /fluentd/etc/schemas_pb.rb
    class_name DetectorSchema
    protobuf_version protobuf3
  </parse>
  uri ipc:///run/output.ipc
  tag nng.*
</source>

<match nng.**>
  @type file
  path /fluentd/log/output.%Y%m%d
  compress text
  <buffer>
    flush_mode immediate
    timekey 1d
    timekey_use_utc true
  </buffer>
</match>

