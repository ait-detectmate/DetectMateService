x-default-args: &default-args
  DETECTMATELIBRARY_BRANCH: main

services:
  parser:
    build:
      context: ..
      dockerfile: demo/Dockerfile
      args: *default-args
    container_name: detectmate_parser
    command: >
      detectmate
      --settings demo/config/parser_settings.yaml
      --config demo/config/parser_config.yaml
    volumes:
      - ../demo/config:/app/demo/config
      - ../logs:/app/logs
      - ../demo/data:/app/demo/data  # template file is here
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "python3", "-m", "service.client", "--url", "http://127.0.0.1:8010", "status" ]
      interval: 60s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - detectmate_net

  detector:
    build:
      context: ..
      dockerfile: demo/Dockerfile
      args: *default-args
    container_name: detectmate_detector
    command: >
      detectmate
      --settings demo/config/detector_settings.yaml
      --config demo/config/detector_config.yaml
    volumes:
      - ../demo/config:/app/demo/config
      - ../logs:/app/logs
    depends_on:
      parser:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "python3", "-m", "service.client", "--url", "http://127.0.0.1:8020", "status" ]
      interval: 60s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - detectmate_net

  demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile
      args: *default-args
    container_name: detectmate_demo
    command: python demo/manual_demo_run_tcp.py
    volumes:
      - ../demo:/app/demo
      - ../demo/data:/app/demo/data
      - ../logs:/app/logs
    depends_on:
      parser:
        condition: service_healthy
      detector:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - detectmate_net
    restart: "no"  # don't restart after completion

networks:
  detectmate_net:
    driver: bridge
